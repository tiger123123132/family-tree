<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>شجرة العائلة</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#f5efe0; font-family:'Segoe UI',Tahoma,sans-serif; min-height:100vh; overflow:hidden; }

#panel {
position:fixed; top:0; right:0;
width:260px; height:100vh;
background:linear-gradient(180deg,#1c0a00,#2d1200);
border-left:2px solid #c9a84c;
z-index:100; overflow-y:auto; padding:14px;
display:flex; flex-direction:column; gap:12px;
}
#panel h2 { color:#f0d080; font-size:1.1rem; text-align:center; padding-bottom:8px; border-bottom:1px solid #8b6914; }
.ps { display:flex; flex-direction:column; gap:7px; }
.pl { color:#c9a84c; font-size:0.76rem; font-weight:700; }
.pi {
background:rgba(201,168,76,0.1); border:1px solid #8b6914;
border-radius:6px; padding:7px 10px; color:#fdf6e3;
font-size:0.86rem; width:100%; direction:rtl;
}
.pi:focus { outline:none; border-color:#c9a84c; background:rgba(201,168,76,0.18); }
.pb { width:100%; padding:8px; border:none; border-radius:6px; font-size:0.86rem; font-weight:700; cursor:pointer; transition:all .2s; }
.pbg { background:linear-gradient(135deg,#8b6914,#c9a84c,#8b6914); color:#1c0a00; }
.pbg:hover { transform:translateY(-1px); box-shadow:0 4px 14px rgba(201,168,76,.4); }
.pbo { background:transparent; border:1px solid #8b6914; color:#c9a84c; }
.pbo:hover { background:rgba(201,168,76,.12); }
.pbr { background:rgba(150,30,30,.25); border:1px solid #7a1a1a; color:#ff8080; }
.pbr:hover { background:rgba(150,30,30,.4); }
.pdiv { border:none; border-top:1px solid rgba(201,168,76,.2); }
.sbox { background:rgba(201,168,76,.1); border:1px solid #8b6914; border-radius:7px; padding:9px; }
.sn { color:#f0d080; font-size:.95rem; font-weight:700; margin-bottom:2px; }
.ss { color:rgba(253,246,227,.5); font-size:.73rem; }
.mlist { max-height:160px; overflow-y:auto; }
.mlist::-webkit-scrollbar { width:3px; }
.mlist::-webkit-scrollbar-thumb { background:#8b6914; }
.mi { padding:5px 8px; border-radius:5px; cursor:pointer; font-size:.79rem; color:#fdf6e3; border-bottom:1px solid rgba(201,168,76,.08); display:flex; justify-content:space-between; align-items:center; }
.mi:hover { background:rgba(201,168,76,.12); }
.mi.active { background:rgba(201,168,76,.22); }
.mg { font-size:.67rem; color:#c9a84c; opacity:.6; }
.hint { color:rgba(201,168,76,.4); font-size:.7rem; text-align:center; }

#cw { position:fixed; top:0; left:0; right:260px; bottom:0; overflow:hidden; }
#tc { display:block; cursor:grab; }
#tc:active { cursor:grabbing; }

#zc { position:fixed; bottom:20px; left:20px; display:flex; flex-direction:column; gap:5px; z-index:50; }
.zb { width:34px; height:34px; background:rgba(28,10,0,.85); border:1px solid #8b6914; border-radius:6px; color:#c9a84c; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; }
.zb:hover { background:rgba(201,168,76,.2); }

#eb { position:fixed; bottom:20px; left:70px; background:linear-gradient(135deg,#8b6914,#c9a84c); color:#1c0a00; border:none; border-radius:7px; padding:8px 15px; font-size:.82rem; font-weight:700; cursor:pointer; z-index:50; transition:all .2s; }
#eb:hover { transform:translateY(-2px); box-shadow:0 5px 14px rgba(201,168,76,.4); }

#tip { position:fixed; background:#1c0a00; border:1.5px solid #c9a84c; border-radius:7px; padding:7px 13px; color:#fdf6e3; font-size:.8rem; pointer-events:none; z-index:200; opacity:0; transition:opacity .15s; text-align:center; }
#tip.show { opacity:1; }
#tip b { color:#f0d080; display:block; font-size:.9rem; margin-bottom:1px; }

#mo { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:300; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity .2s; }
#mo.open { opacity:1; pointer-events:all; }
#mb { background:linear-gradient(135deg,#2d1200,#1c0a00); border:2px solid #c9a84c; border-radius:12px; padding:22px; width:300px; max-width:90vw; transform:scale(.92); transition:transform .2s; }
#mo.open #mb { transform:scale(1); }
#mb h3 { color:#f0d080; text-align:center; margin-bottom:16px; font-size:1rem; }
.mbs { display:flex; gap:9px; margin-top:14px; }

@media(max-width:640px){
#panel { width:100%; height:auto; max-height:45vh; position:relative; }
#cw { position:relative; right:0; height:55vh; }
body { display:flex; flex-direction:column; overflow:auto; }
#zc { bottom:10px; }
#eb { bottom:10px; left:60px; }
}
</style>

</head>
<body>

<div id="panel">
  <h2>🌳 شجرة العائلة</h2>

  <div class="ps">
    <span class="pl">اسم الشجرة</span>
    <input class="pi" id="iTitle" value="شجرة العائلة">
    <button class="pb pbo" onclick="applyTitle()">تحديث</button>
  </div>

  <hr class="pdiv">

  <div class="ps" id="secRoot">
    <span class="pl">الجد الأكبر</span>
    <input class="pi" id="iRN" placeholder="الاسم">
    <input class="pi" id="iRS" placeholder="تفاصيل (اختياري)">
    <button class="pb pbg" onclick="addRoot()">🌱 ابدأ الشجرة</button>
  </div>

  <div class="ps" id="secSel" style="display:none">
    <span class="pl">العنصر المحدد</span>
    <div class="sbox"><div class="sn" id="sn">-</div><div class="ss" id="ss">-</div></div>
    <span class="pl">إضافة فرع جديد</span>
    <input class="pi" id="iCN" placeholder="الاسم">
    <input class="pi" id="iCS" placeholder="تفاصيل (اختياري)">
    <button class="pb pbg" onclick="addChild()">➕ إضافة فرع</button>
    <button class="pb pbo" onclick="openEdit()">✏️ تعديل</button>
    <button class="pb pbr" onclick="deleteNode()">🗑️ حذف</button>
  </div>

  <hr class="pdiv">

  <div class="ps" id="secList" style="display:none">
    <span class="pl">الأعضاء</span>
    <div class="mlist" id="ml"></div>
  </div>

  <div class="hint">انقر على أي عنصر لتحديده</div>
</div>

<div id="cw"><canvas id="tc"></canvas></div>

<div id="zc">
  <button class="zb" onclick="zoom(1.2)">+</button>
  <button class="zb" onclick="zoom(0.83)">−</button>
  <button class="zb" onclick="fitView()">⊙</button>
</div>
<button id="eb" onclick="exportImg()">⬇ تصدير</button>

<div id="tip"><b id="tn"></b><span id="ts"></span></div>

<div id="mo">
  <div id="mb">
    <h3>تعديل البيانات</h3>
    <div class="ps">
      <span class="pl">الاسم</span><input class="pi" id="iEN" placeholder="الاسم">
      <span class="pl">التفاصيل</span><input class="pi" id="iES" placeholder="تفاصيل">
    </div>
    <div class="mbs">
      <button class="pb pbg" style="flex:1" onclick="saveEdit()">حفظ</button>
      <button class="pb pbo" style="flex:1" onclick="closeMo()">إلغاء</button>
    </div>
  </div>
</div>

<script>
var nodes=[], nid=1, selId=null, title="شجرة العائلة";
var canvas,ctx,wrap;
var ox=0,oy=0,sc=1;
var drag=false,dx0,dy0,ox0,oy0,moved=false;
var pos={}; // id->{x,y}

window.onload=function(){
  canvas=document.getElementById('tc');
  ctx=canvas.getContext('2d');
  wrap=document.getElementById('cw');
  doResize();
  window.addEventListener('resize',function(){doResize();render();});
  canvas.addEventListener('mousedown',mdn);
  canvas.addEventListener('mousemove',mmv);
  canvas.addEventListener('mouseup',mup);
  canvas.addEventListener('mouseleave',mup);
  canvas.addEventListener('click',mck);
  canvas.addEventListener('wheel',mwh,{passive:false});
  canvas.addEventListener('touchstart',tdn,{passive:false});
  canvas.addEventListener('touchmove',tmv,{passive:false});
  canvas.addEventListener('touchend',tup);
  document.getElementById('iRN').addEventListener('keydown',function(e){if(e.key==='Enter')addRoot();});
  document.getElementById('iCN').addEventListener('keydown',function(e){if(e.key==='Enter')addChild();});
  render();
};

function doResize(){
  canvas.width=wrap.clientWidth||window.innerWidth-260;
  canvas.height=wrap.clientHeight||window.innerHeight;
}

function addRoot(){
  var name=document.getElementById('iRN').value.trim();
  if(!name){shake('iRN');return;}
  var sub=document.getElementById('iRS').value.trim();
  nodes=[];nid=1;
  nodes.push({id:nid++,name:name,sub:sub,parentId:null});
  document.getElementById('iRN').value='';
  document.getElementById('iRS').value='';
  document.getElementById('secRoot').style.display='none';
  layout();
  setTimeout(function(){fitView();refreshList();selectNode(nodes[0].id);},80);
}

function addChild(){
  if(!selId)return;
  var name=document.getElementById('iCN').value.trim();
  if(!name){shake('iCN');return;}
  var sub=document.getElementById('iCS').value.trim();
  nodes.push({id:nid++,name:name,sub:sub,parentId:selId});
  document.getElementById('iCN').value='';
  document.getElementById('iCS').value='';
  layout();render();refreshList();
}

function deleteNode(){
  if(!selId)return;
  var root=nodes.find(function(n){return !n.parentId;});
  if(root&&root.id===selId){
    if(!confirm('حذف الشجرة كاملة؟'))return;
    nodes=[];selId=null;
    document.getElementById('secRoot').style.display='';
    document.getElementById('secSel').style.display='none';
    document.getElementById('secList').style.display='none';
    render();return;
  }
  function rem(id){
    nodes.filter(function(n){return n.parentId===id;}).forEach(function(c){rem(c.id);});
    nodes=nodes.filter(function(n){return n.id!==id;});
  }
  rem(selId);selId=null;
  document.getElementById('secSel').style.display='none';
  layout();render();refreshList();
}

function applyTitle(){
  title=document.getElementById('iTitle').value||'شجرة العائلة';
  render();
}

// ---- LAYOUT ----
function layout(){
  pos={};
  if(!nodes.length)return;
  var root=nodes.find(function(n){return !n.parentId;});
  if(!root)return;

  var cx=canvas.width/sc/2;
  var trunkH=Math.min(canvas.height/sc*0.25,180);
  var baseY=canvas.height/sc*0.78;
  var rootY=baseY-trunkH;

  // assign levels
  var lv={};lv[root.id]=0;
  var q=[root.id];
  while(q.length){
    var cur=q.shift();
    nodes.filter(function(n){return n.parentId===cur;}).forEach(function(c){
      lv[c.id]=(lv[cur]||0)+1;q.push(c.id);
    });
  }

  function stW(id){
    var ch=nodes.filter(function(n){return n.parentId===id;});
    if(!ch.length)return 1;
    return ch.reduce(function(s,c){return s+stW(c.id);},0);
  }

  var aRng={};
  aRng[root.id]={s:-Math.PI*1.1,e:-Math.PI*0.0};
  pos[root.id]={x:cx,y:rootY};

  var bq=[root.id];
  while(bq.length){
    var p=bq.shift();
    var ch=nodes.filter(function(n){return n.parentId===p;});
    if(!ch.length)continue;
    var rng=aRng[p];
    var tot=stW(p);
    var ppos=pos[p];
    var plv=lv[p]||0;
    var rad=Math.max(70,150-plv*15);
    var cursor=rng.s;
    ch.forEach(function(c){
      var w=stW(c.id)/tot;
      var cs=cursor,ce=cursor+(rng.e-rng.s)*w;
      var mid=(cs+ce)/2;
      var margin=(ce-cs)*0.04;
      aRng[c.id]={s:cs+margin,e:ce-margin};
      pos[c.id]={x:ppos.x+Math.cos(mid)*rad, y:ppos.y+Math.sin(mid)*rad};
      cursor=ce;
      bq.push(c.id);
    });
  }
}

function depth(id){
  var d=0,cur=nodes.find(function(n){return n.id===id;});
  while(cur&&cur.parentId){d++;cur=nodes.find(function(n){return n.id===cur.parentId;});}
  return d;
}

// ---- RENDER ----
function render(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // bg
  var bg=ctx.createRadialGradient(canvas.width/2,canvas.height*0.55,30,canvas.width/2,canvas.height/2,canvas.width*0.8);
  bg.addColorStop(0,'#faf4e4');bg.addColorStop(1,'#e8dcc8');
  ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);

  // title
  ctx.save();
  ctx.textAlign='center';ctx.textBaseline='top';
  ctx.fillStyle='#3d1f0a';
  ctx.font='bold '+Math.max(16,Math.min(28,canvas.width*0.038))+'px serif';
  ctx.fillText(title,canvas.width/2,12);
  ctx.restore();

  if(!nodes.length){
    ctx.save();ctx.textAlign='center';ctx.fillStyle='rgba(100,60,20,0.28)';
    ctx.font=Math.min(20,canvas.width*0.035)+'px serif';
    ctx.fillText('أضف الجد الأكبر للبدء',canvas.width/2,canvas.height/2);
    ctx.restore();return;
  }

  ctx.save();
  ctx.translate(ox,oy);ctx.scale(sc,sc);

  var root=nodes.find(function(n){return !n.parentId;});
  if(!root||!pos[root.id]){ctx.restore();return;}

  var rp=pos[root.id];
  var trunkH=Math.min(canvas.height/sc*0.25,180);
  var baseY=rp.y+trunkH;

  drawTrunk(rp.x,baseY,rp.y);
  drawGround(rp.x,baseY);

  // branches
  nodes.forEach(function(n){
    if(n.parentId&&pos[n.id]&&pos[n.parentId]){
      drawBranch(pos[n.parentId],pos[n.id],depth(n.id));
    }
  });

  // nodes
  nodes.forEach(function(n){
    if(pos[n.id])drawNode(n,pos[n.id]);
  });

  ctx.restore();
}

function drawTrunk(x,baseY,topY){
  var w1=22,w2=11;
  var g=ctx.createLinearGradient(x-w1,0,x+w1,0);
  g.addColorStop(0,'#3d1f0a');g.addColorStop(0.3,'#7a4520');
  g.addColorStop(0.6,'#a05c28');g.addColorStop(0.85,'#7a4520');g.addColorStop(1,'#3d1f0a');
  ctx.beginPath();
  ctx.moveTo(x-w1,baseY);
  ctx.bezierCurveTo(x-w1,baseY-25,x-w2,topY+15,x-w2,topY);
  ctx.lineTo(x+w2,topY);
  ctx.bezierCurveTo(x+w2,topY+15,x+w1,baseY-25,x+w1,baseY);
  ctx.closePath();ctx.fillStyle=g;ctx.fill();
  // bark lines
  ctx.strokeStyle='rgba(61,31,10,0.35)';ctx.lineWidth=0.9;
  for(var i=0;i<4;i++){
    var yy=baseY-(baseY-topY)*(i/4+0.1);
    var xo=(i%2===0?1:-1)*3;
    ctx.beginPath();ctx.moveTo(x+xo-5,yy);
    ctx.bezierCurveTo(x+xo,yy-6,x+xo+5,yy-3,x+xo+7,yy+2);ctx.stroke();
  }
}

function drawGround(x,baseY){
  var g=ctx.createRadialGradient(x,baseY,4,x,baseY+8,65);
  g.addColorStop(0,'#5a8a20');g.addColorStop(0.5,'#3a6a10');g.addColorStop(1,'rgba(40,80,10,0)');
  ctx.beginPath();ctx.ellipse(x,baseY+6,60,18,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  // roots
  ctx.strokeStyle='#4a2510';ctx.lineWidth=3.5;ctx.lineCap='round';
  [[-22,16],[-8,20],[8,20],[22,16]].forEach(function(r){
    ctx.beginPath();ctx.moveTo(x+r[0]*0.35,baseY);
    ctx.bezierCurveTo(x+r[0]*0.6,baseY+r[1]*0.5,x+r[0],baseY+r[1]*0.8,x+r[0],baseY+r[1]);ctx.stroke();
  });
}

function drawBranch(from,to,d){
  var w=Math.max(1.2,8-d*1.6);
  var g=ctx.createLinearGradient(from.x,from.y,to.x,to.y);
  g.addColorStop(0,'#6b3a1f');g.addColorStop(1,'#4a2510');
  ctx.beginPath();ctx.moveTo(from.x,from.y);
  var c1x=from.x+(to.x-from.x)*0.25,c1y=from.y+(to.y-from.y)*0.1;
  var c2x=from.x+(to.x-from.x)*0.65,c2y=to.y-(to.y-from.y)*0.12;
  ctx.bezierCurveTo(c1x,c1y,c2x,c2y,to.x,to.y);
  ctx.strokeStyle=g;ctx.lineWidth=w;ctx.lineCap='round';ctx.stroke();
}

function drawNode(node,p){
  var d=depth(node.id);
  var isSel=node.id===selId;
  if(!node.parentId){
    drawOval(p.x,p.y,50,24,node,isSel,'#c9a84c','#8b6914','#1c0a00');
  } else if(d===1){
    drawOval(p.x,p.y,42,21,node,isSel,'#b8962a','#7a6010','#1c0a00');
  } else {
    drawLeaf(p.x,p.y,node,isSel,d);
  }
}

function drawOval(x,y,rw,rh,node,isSel,c1,c2,tc){
  if(isSel){ctx.shadowColor='#f0d080';ctx.shadowBlur=16;}
  ctx.beginPath();ctx.ellipse(x,y,rw+3,rh+3,0,0,Math.PI*2);
  ctx.strokeStyle=isSel?'rgba(240,208,128,0.5)':'rgba(201,168,76,0.3)';ctx.lineWidth=1;ctx.stroke();
  var g=ctx.createRadialGradient(x-rw*0.25,y-rh*0.3,1,x,y,rw);
  g.addColorStop(0,'#e8c060');g.addColorStop(0.5,c1);g.addColorStop(1,c2);
  ctx.beginPath();ctx.ellipse(x,y,rw,rh,0,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle=isSel?'#f0d080':'#a07820';ctx.lineWidth=isSel?2.2:1.4;ctx.stroke();
  ctx.shadowBlur=0;
  ctx.fillStyle=tc;ctx.textAlign='center';ctx.textBaseline='middle';
  var fs=Math.min(12,rw*1.4/(node.name.length+1)+5);
  ctx.font='bold '+fs+'px serif';
  ctx.fillText(clip(node.name,10),x,node.sub?y-5:y);
  if(node.sub){ctx.font=(fs-1)+'px serif';ctx.fillStyle='rgba(28,10,0,0.6)';ctx.fillText(clip(node.sub,10),x,y+7);}
}

function drawLeaf(x,y,node,isSel,d){
  var par=nodes.find(function(n){return n.id===node.parentId;});
  var pp=par&&pos[par.id]?pos[par.id]:{x:x,y:y+1};
  var ang=Math.atan2(y-pp.y,x-pp.x);
  var rw=Math.max(30,42-d*2.5);
  var rh=Math.max(17,25-d*2);
  if(isSel){ctx.shadowColor='#f0d080';ctx.shadowBlur=12;}
  var gl=d>4?'#3a7a3a':'#4db84d';
  var gd=d>4?'#1a4a1a':'#2d7a2d';
  var g=ctx.createRadialGradient(x-rw*0.2,y-rh*0.3,1,x,y,rw);
  g.addColorStop(0,gl);g.addColorStop(1,gd);
  ctx.save();ctx.translate(x,y);
  var rot=Math.max(-0.28,Math.min(0.28,(x-canvas.width/sc/2)*0.0025));
  ctx.rotate(rot);
  ctx.beginPath();ctx.ellipse(0,0,rw,rh,0,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
  ctx.strokeStyle=isSel?'#f0d080':'#c9a84c';ctx.lineWidth=isSel?1.8:1;ctx.stroke();
  // vein
  ctx.strokeStyle='rgba(201,168,76,0.22)';ctx.lineWidth=0.6;
  ctx.beginPath();ctx.moveTo(0,-rh+3);ctx.lineTo(0,rh-3);ctx.stroke();
  [-1,1].forEach(function(s){
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(rw*0.55*s,-rh*0.28);ctx.stroke();
  });
  ctx.shadowBlur=0;
  ctx.fillStyle='#fdf6e3';ctx.textAlign='center';ctx.textBaseline='middle';
  var fs=Math.min(11,rw*1.3/(node.name.length+1)+4);
  ctx.font='bold '+fs+'px serif';
  ctx.fillText(clip(node.name,9),0,0);
  ctx.restore();
}

// ---- HIT ----
function hit(mx,my){
  var tx=(mx-ox)/sc,ty=(my-oy)/sc;
  for(var i=nodes.length-1;i>=0;i--){
    var n=nodes[i];if(!pos[n.id])continue;
    var p=pos[n.id],d=depth(n.id);
    var rw=!n.parentId?54:d===1?46:Math.max(34,46-d*2.5);
    var rh=!n.parentId?28:d===1?25:Math.max(21,29-d*2);
    var dx=tx-p.x,dy=ty-p.y;
    if((dx*dx)/(rw*rw)+(dy*dy)/(rh*rh)<=1)return n;
  }
  return null;
}

// ---- MOUSE ----
function mdn(e){drag=true;moved=false;dx0=e.clientX;dy0=e.clientY;ox0=ox;oy0=oy;}
function mmv(e){
  if(drag){
    if(Math.abs(e.clientX-dx0)+Math.abs(e.clientY-dy0)>4)moved=true;
    ox=ox0+(e.clientX-dx0);oy=oy0+(e.clientY-dy0);render();
  }
  var rect=canvas.getBoundingClientRect();
  var n=hit(e.clientX-rect.left,e.clientY-rect.top);
  var tip=document.getElementById('tip');
  if(n){
    document.getElementById('tn').textContent=n.name;
    document.getElementById('ts').textContent=n.sub||'';
    tip.style.left=(e.clientX+14)+'px';tip.style.top=(e.clientY-16)+'px';tip.classList.add('show');
    canvas.style.cursor='pointer';
  } else {tip.classList.remove('show');canvas.style.cursor=drag?'grabbing':'grab';}
}
function mup(){drag=false;}
function mck(e){
  if(moved)return;
  var rect=canvas.getBoundingClientRect();
  var n=hit(e.clientX-rect.left,e.clientY-rect.top);
  if(n)selNode(n.id);
  else{selId=null;document.getElementById('secSel').style.display='none';render();}
}
function mwh(e){
  e.preventDefault();
  var f=e.deltaY>0?0.88:1.14;
  var rect=canvas.getBoundingClientRect();
  var mx=e.clientX-rect.left,my=e.clientY-rect.top;
  ox=mx-(mx-ox)*f;oy=my-(my-oy)*f;
  sc=Math.max(0.15,Math.min(4,sc*f));render();
}

// ---- TOUCH ----
var t0x,t0y,tox0,toy0,tmoved=false;
function tdn(e){
  e.preventDefault();
  if(e.touches.length===1){drag=true;tmoved=false;t0x=e.touches[0].clientX;t0y=e.touches[0].clientY;tox0=ox;toy0=oy;}
}
function tmv(e){
  e.preventDefault();
  if(e.touches.length===1&&drag){
    var dx=e.touches[0].clientX-t0x,dy=e.touches[0].clientY-t0y;
    if(Math.abs(dx)+Math.abs(dy)>5)tmoved=true;
    ox=tox0+dx;oy=toy0+dy;render();
  }
}
function tup(e){
  drag=false;
  if(!tmoved&&e.changedTouches.length===1){
    var rect=canvas.getBoundingClientRect();
    var t=e.changedTouches[0];
    var n=hit(t.clientX-rect.left,t.clientY-rect.top);
    if(n)selNode(n.id);
  }
}

// ---- VIEW ----
function zoom(f){sc=Math.max(0.15,Math.min(4,sc*f));render();}
function fitView(){
  if(!nodes.length||!Object.keys(pos).length)return;
  var ps2=Object.values(pos);
  var xs=ps2.map(function(p){return p.x;}),ys=ps2.map(function(p){return p.y;});
  var mnX=Math.min.apply(null,xs)-70,mxX=Math.max.apply(null,xs)+70;
  var mnY=Math.min.apply(null,ys)-70,mxY=Math.max.apply(null,ys)+130;
  var tw=mxX-mnX,th=mxY-mnY;
  sc=Math.min(canvas.width/tw,canvas.height/th,1.6)*0.86;
  ox=(canvas.width-tw*sc)/2-mnX*sc;
  oy=(canvas.height-th*sc)/2-mnY*sc+10;
  render();
}

// ---- UI ----
function selNode(id){
  selId=id;
  var n=nodes.find(function(x){return x.id===id;});if(!n)return;
  document.getElementById('secSel').style.display='';
  document.getElementById('sn').textContent=n.name;
  document.getElementById('ss').textContent=n.sub||'بدون تفاصيل';
  refreshList();render();
}

function refreshList(){
  var sec=document.getElementById('secList'),ml=document.getElementById('ml');
  if(nodes.length>1){
    sec.style.display='';
    ml.innerHTML=nodes.map(function(n){
      var d=depth(n.id);
      return '<div class="mi'+(n.id===selId?' active':'')+'" onclick="selNode('+n.id+')">'
        +'<span>'+'　'.repeat(d)+n.name+'</span>'
        +'<span class="mg">جيل '+(d+1)+'</span></div>';
    }).join('');
  } else sec.style.display='none';
}

function openEdit(){
  if(!selId)return;
  var n=nodes.find(function(x){return x.id===selId;});
  document.getElementById('iEN').value=n.name;
  document.getElementById('iES').value=n.sub||'';
  document.getElementById('mo').classList.add('open');
}
function closeMo(){document.getElementById('mo').classList.remove('open');}
function saveEdit(){
  if(!selId)return;
  var n=nodes.find(function(x){return x.id===selId;});
  var nm=document.getElementById('iEN').value.trim();
  if(nm)n.name=nm;n.sub=document.getElementById('iES').value.trim();
  closeMo();
  document.getElementById('sn').textContent=n.name;
  document.getElementById('ss').textContent=n.sub||'بدون تفاصيل';
  refreshList();render();
}
document.getElementById('mo').addEventListener('click',function(e){if(e.target===this)closeMo();});

// ---- EXPORT ----
function exportImg(){
  var e2=document.createElement('canvas');
  e2.width=canvas.width+50;e2.height=canvas.height+50;
  var ec=e2.getContext('2d');
  ec.fillStyle='#f5efe0';ec.fillRect(0,0,e2.width,e2.height);
  ec.strokeStyle='#c9a84c';ec.lineWidth=3.5;ec.strokeRect(6,6,e2.width-12,e2.height-12);
  ec.strokeStyle='rgba(201,168,76,0.3)';ec.lineWidth=1;ec.strokeRect(12,12,e2.width-24,e2.height-24);
  ec.drawImage(canvas,25,25);
  var lnk=document.createElement('a');
  lnk.download=title+'.png';lnk.href=e2.toDataURL('image/png');lnk.click();
}

// ---- HELPERS ----
function clip(s,n){if(!s)return '';return s.length>n?s.substring(0,n-1)+'…':s;}
function shake(id){
  var el=document.getElementById(id);el.style.borderColor='#ff4444';el.focus();
  setTimeout(function(){el.style.borderColor='';},1500);
}
</script>
