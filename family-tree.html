<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة العائلة</title>

<style>
  :root {
    --gold: #c9a84c;
    --gold-light: #f0d080;
    --gold-dark: #8b6914;
    --brown-dark: #3d1f0a;
    --brown: #6b3a1f;
    --brown-light: #a0622a;
    --green-dark: #1a4a1a;
    --green: #2d7a2d;
    --green-light: #4aaa4a;
    --cream: #fdf6e3;
    --bg: #0d0805;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
    background: var(--bg);
    color: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== HEADER ===== */
  .header {
    background: linear-gradient(135deg, #1a0a02 0%, #3d1f0a 50%, #1a0a02 100%);
    border-bottom: 3px solid var(--gold);
    padding: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.5;
  }
  .header h1 {
    font-family: Georgia, serif;
    font-size: 2.8rem;
    color: var(--gold-light);
    text-shadow: 0 0 30px rgba(201,168,76,0.5), 2px 2px 4px rgba(0,0,0,0.8);
    position: relative;
    letter-spacing: 2px;
  }
  .header p {
    color: var(--gold);
    font-size: 0.95rem;
    margin-top: 6px;
    position: relative;
    opacity: 0.85;
  }
  .ornament {
    color: var(--gold);
    font-size: 1.5rem;
    margin: 0 12px;
    opacity: 0.7;
  }

  /* ===== MAIN LAYOUT ===== */
  .app {
    display: grid;
    grid-template-columns: 320px 1fr;
    min-height: calc(100vh - 110px);
  }

  /* ===== SIDEBAR ===== */
  .sidebar {
    background: linear-gradient(180deg, #1a0a02 0%, #0d0805 100%);
    border-left: 2px solid var(--gold-dark);
    padding: 20px;
    overflow-y: auto;
  }

  .sidebar-section {
    margin-bottom: 24px;
  }

  .sidebar-title {
    font-family: Georgia, serif;
    color: var(--gold-light);
    font-size: 1.15rem;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--gold-dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .sidebar-title::before {
    content: '❧';
    font-size: 1.2rem;
    color: var(--gold);
  }

  .input-group {
    margin-bottom: 12px;
  }
  .input-group label {
    display: block;
    color: var(--gold);
    font-size: 0.82rem;
    margin-bottom: 5px;
    font-weight: 600;
  }
  .input-group input, .input-group select {
    width: 100%;
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold-dark);
    border-radius: 8px;
    padding: 9px 12px;
    color: var(--cream);
    font-family: Arial, sans-serif;
    font-size: 0.9rem;
    transition: all 0.3s;
    direction: rtl;
  }
  .input-group input:focus, .input-group select:focus {
    outline: none;
    border-color: var(--gold);
    background: rgba(201,168,76,0.14);
    box-shadow: 0 0 12px rgba(201,168,76,0.2);
  }
  .input-group select option {
    background: #1a0a02;
  }

  .btn {
    width: 100%;
    padding: 10px 16px;
    border: none;
    border-radius: 8px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold), var(--gold-dark));
    color: var(--brown-dark);
  }
  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(201,168,76,0.4);
  }
  .btn-secondary {
    background: transparent;
    border: 1px solid var(--gold-dark);
    color: var(--gold);
    margin-top: 8px;
  }
  .btn-secondary:hover {
    background: rgba(201,168,76,0.1);
  }
  .btn-danger {
    background: rgba(180,40,40,0.2);
    border: 1px solid #8b2020;
    color: #ff8080;
    margin-top: 8px;
  }
  .btn-danger:hover { background: rgba(180,40,40,0.35); }

  /* Selected node info */
  .selected-info {
    background: rgba(201,168,76,0.08);
    border: 1px solid var(--gold-dark);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 14px;
    font-size: 0.85rem;
  }
  .selected-info .selected-name {
    color: var(--gold-light);
    font-size: 1.05rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .selected-info .selected-detail {
    color: rgba(253,246,227,0.6);
    font-size: 0.8rem;
  }

  /* Node list */
  .node-list {
    max-height: 220px;
    overflow-y: auto;
    margin-top: 10px;
  }
  .node-list::-webkit-scrollbar { width: 4px; }
  .node-list::-webkit-scrollbar-track { background: transparent; }
  .node-list::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 2px; }

  .node-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 10px;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s;
    font-size: 0.85rem;
    border-bottom: 1px solid rgba(201,168,76,0.08);
  }
  .node-item:hover { background: rgba(201,168,76,0.1); }
  .node-item.active { background: rgba(201,168,76,0.18); }
  .node-item-name { color: var(--cream); }
  .node-item-role {
    font-size: 0.72rem;
    color: var(--gold);
    opacity: 0.7;
  }

  /* ===== TREE CANVAS ===== */
  .tree-area {
    position: relative;
    overflow: auto;
    background: radial-gradient(ellipse at center, #1a0e06 0%, #0d0805 70%);
    cursor: grab;
    min-height: 400px;
  }
  .tree-area:active { cursor: grabbing; }

  .tree-title {
    text-align: center;
    font-family: Georgia, serif;
    font-size: 2rem;
    color: var(--gold-light);
    padding: 24px 20px 10px;
    text-shadow: 0 0 20px rgba(201,168,76,0.4);
    letter-spacing: 3px;
    pointer-events: none;
  }

  #treeCanvas {
    display: block;
    margin: 0 auto;
  }

  /* Node tooltip */
  .tooltip {
    position: fixed;
    background: linear-gradient(135deg, #2d1505, #1a0a02);
    border: 1.5px solid var(--gold);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.85rem;
    color: var(--cream);
    pointer-events: none;
    z-index: 1000;
    opacity: 0;
    transition: opacity 0.2s;
    max-width: 200px;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
  }
  .tooltip.visible { opacity: 1; }
  .tooltip-name { color: var(--gold-light); font-size: 1rem; font-weight: 700; }
  .tooltip-detail { color: rgba(253,246,227,0.65); font-size: 0.78rem; margin-top: 2px; }

  /* Controls */
  .canvas-controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 8px;
    z-index: 10;
  }
  .ctrl-btn {
    width: 38px; height: 38px;
    background: rgba(61,31,10,0.85);
    border: 1px solid var(--gold-dark);
    border-radius: 8px;
    color: var(--gold);
    font-size: 1.2rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .ctrl-btn:hover { background: rgba(201,168,76,0.2); }

  /* Export btn */
  .export-area {
    position: absolute;
    top: 16px;
    left: 16px;
    z-index: 10;
  }
  .export-btn {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: var(--brown-dark);
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-family: Arial, sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.3s;
  }
  .export-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(201,168,76,0.4); }

  /* Instructions */
  .instructions {
    font-size: 0.78rem;
    color: rgba(253,246,227,0.4);
    text-align: center;
    padding: 0 0 16px;
    pointer-events: none;
  }

  /* Empty state */
  .empty-state {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
  }
  .empty-icon { font-size: 5rem; opacity: 0.15; }
  .empty-text { color: rgba(201,168,76,0.4); font-size: 1rem; font-family: Georgia, serif; }

  /* Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.8);
    backdrop-filter: blur(4px);
    z-index: 2000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: linear-gradient(135deg, #2d1505, #1a0a02);
    border: 2px solid var(--gold);
    border-radius: 16px;
    padding: 28px;
    width: 360px;
    max-width: 90vw;
    transform: scale(0.9);
    transition: transform 0.3s;
    box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  }
  .modal-overlay.open .modal { transform: scale(1); }
  .modal-title {
    font-family: Georgia, serif;
    font-size: 1.4rem;
    color: var(--gold-light);
    margin-bottom: 20px;
    text-align: center;
  }

  /* Decorative borders */
  .deco-top, .deco-bottom {
    text-align: center;
    color: var(--gold);
    font-size: 1.3rem;
    opacity: 0.4;
    padding: 10px 0;
  }

  @media (max-width: 768px) {
    .app { grid-template-columns: 1fr; grid-template-rows: auto 1fr; min-height: calc(100vh - 110px); }
    .sidebar { border-left: none; border-bottom: 2px solid var(--gold-dark); max-height: 42vh; overflow-y: auto; }
    .tree-area { min-height: 58vh; height: 58vh; }
    .header h1 { font-size: 1.8rem; }
  }
</style>

<script>
// ============================
// DATA STRUCTURE
// ============================
let nodes = [];         // {id, name, detail, parentId, x, y, level, index}
let nextId = 1;
let selectedId = null;
let treeName = "شجرة العائلة";

// Canvas state
let canvas, ctx;
let scale = 1;
let offsetX = 0, offsetY = 0;
let isDragging = false;

const NODE_W = 90;
const NODE_H = 36;
const LEVEL_H = 110;

// Colors
const GOLD = '#c9a84c';
const GOLD_LIGHT = '#f0d080';
const BROWN_DARK = '#3d1f0a';
const BROWN = '#6b3a1f';
const GREEN_DARK = '#1a4a1a';
const GREEN = '#2d7a2d';
const CREAM = '#fdf6e3';

// ============================
// INIT
// ============================
window.onload = () => {
  canvas = document.getElementById('treeCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  canvas.addEventListener('mousedown', onMouseDown);
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('mouseup', onMouseUp);
  canvas.addEventListener('click', onCanvasClick);
  canvas.addEventListener('wheel', onWheel, { passive: false });
  canvas.addEventListener('touchstart', onTouchStart, {passive:false});
  canvas.addEventListener('touchmove', onTouchMove, {passive:false});
  canvas.addEventListener('touchend', onTouchEnd);

  document.getElementById('treeName').addEventListener('input', () => {
    treeName = document.getElementById('treeName').value || "شجرة العائلة";
    document.getElementById('treeTitleDisplay').textContent = treeName;
  });

  // Enter key shortcuts
  document.getElementById('rootName').addEventListener('keydown', e => { if(e.key==='Enter') addRoot(); });
  document.getElementById('newChildName').addEventListener('keydown', e => { if(e.key==='Enter') addChild(); });
};

function resizeCanvas() {
  const area = document.getElementById('treeArea');
  const w = area.clientWidth || window.innerWidth;
  const h = area.clientHeight || window.innerHeight * 0.6;
  canvas.width = Math.max(w, 300);
  canvas.height = Math.max(h - 80, 300);
  draw();
}

// ============================
// TREE MANAGEMENT
// ============================
function addRoot() {
  const name = document.getElementById('rootName').value.trim();
  if (!name) { flash('rootName'); return; }
  const detail = document.getElementById('rootDetail').value.trim();

  nodes = [];
  nextId = 1;
  nodes.push({ id: nextId++, name, detail, parentId: null, level: 0 });

  document.getElementById('rootName').value = '';
  document.getElementById('rootDetail').value = '';
  document.getElementById('addRootSection').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  layout();
  setTimeout(() => { resetView(); updateNodeList(); selectNode(nodes[0].id); }, 100);
}

function addChild() {
  if (!selectedId) return;
  const name = document.getElementById('newChildName').value.trim();
  if (!name) { flash('newChildName'); return; }
  const detail = document.getElementById('newChildDetail').value.trim();
  const parent = nodes.find(n => n.id === selectedId);

  nodes.push({
    id: nextId++,
    name, detail,
    parentId: selectedId,
    level: parent.level + 1
  });

  document.getElementById('newChildName').value = '';
  document.getElementById('newChildDetail').value = '';

  layout();
  draw();
  updateNodeList();
}

function deleteSelected() {
  if (!selectedId) return;
  const root = nodes.find(n => n.parentId === null);
  if (root && root.id === selectedId) {
    if (!confirm('هل تريد حذف الشجرة كاملة؟')) return;
    nodes = [];
    selectedId = null;
    document.getElementById('addRootSection').style.display = '';
    document.getElementById('nodeActions').style.display = 'none';
    document.getElementById('nodeListSection').style.display = 'none';
    document.getElementById('emptyState').style.display = '';
    draw();
    return;
  }

  // Recursively delete node and children
  function removeSubtree(id) {
    nodes.filter(n => n.parentId === id).forEach(c => removeSubtree(c.id));
    nodes = nodes.filter(n => n.id !== id);
  }
  removeSubtree(selectedId);
  selectedId = null;

  layout();
  draw();
  updateNodeList();
  document.getElementById('nodeActions').style.display = 'none';
}

// ============================
// LAYOUT ALGORITHM
// ============================
function layout() {
  if (!nodes.length) return;

  // Assign subtree widths
  function subtreeWidth(id) {
    const children = nodes.filter(n => n.parentId === id);
    if (!children.length) return 1;
    return children.reduce((s, c) => s + subtreeWidth(c.id), 0);
  }

  const root = nodes.find(n => n.parentId === null);
  if (!root) return;

  function assignPos(id, left) {
    const node = nodes.find(n => n.id === id);
    if (!node) return 0;
    const children = nodes.filter(n => n.parentId === id);
    if (!children.length) {
      node.treeX = left + 0.5;
      return 1;
    }
    let cur = left;
    let sw = 0;
    children.forEach(c => {
      const w = subtreeWidth(c.id);
      sw += assignPos(c.id, cur);
      cur += w;
    });
    node.treeX = (left + cur) / 2;
    return cur - left;
  }

  const totalW = subtreeWidth(root.id);
  assignPos(root.id, 0);

  const HGAP = Math.max(NODE_W + 30, 500 / (totalW || 1));
  const VGAP = LEVEL_H;

  nodes.forEach(n => {
    n.x = n.treeX * HGAP;
    const depth = getDepth(n.id);
    n.y = depth * VGAP + 60;
  });
}

function getDepth(id) {
  let d = 0;
  let cur = nodes.find(n => n.id === id);
  while (cur && cur.parentId !== null) {
    d++;
    cur = nodes.find(n => n.id === cur.parentId);
  }
  return d;
}

// ============================
// DRAWING
// ============================
function draw() {
  if (!ctx) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  if (!nodes.length) {
    ctx.restore();
    return;
  }

  // Draw connections
  nodes.forEach(n => {
    if (n.parentId !== null) {
      const parent = nodes.find(p => p.id === n.parentId);
      if (parent) drawBranch(parent, n);
    }
  });

  // Draw nodes
  nodes.forEach(n => drawNode(n));

  ctx.restore();
}

function drawBranch(parent, child) {
  const px = parent.x, py = parent.y;
  const cx = child.x, cy = child.y;

  ctx.save();
  ctx.strokeStyle = BROWN;
  ctx.lineWidth = Math.max(1.5, 5 - getDepth(child.id) * 1.2);
  ctx.lineCap = 'round';

  ctx.beginPath();
  ctx.moveTo(px, py + NODE_H/2);
  const midY = (py + NODE_H/2 + cy - NODE_H/2) / 2;
  ctx.bezierCurveTo(px, midY, cx, midY, cx, cy - NODE_H/2);
  ctx.stroke();

  // Small decorative circle at join
  ctx.fillStyle = GOLD;
  ctx.beginPath();
  ctx.arc(cx, cy - NODE_H/2, 3, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

function drawNode(n) {
  const x = n.x, y = n.y;
  const w = NODE_W, h = NODE_H;
  const isRoot = n.parentId === null;
  const isSelected = n.id === selectedId;
  const depth = getDepth(n.id);

  ctx.save();

  // Node shape based on depth
  if (isRoot) {
    drawRootNode(x, y, w+30, h+10, n, isSelected);
  } else if (depth === 1) {
    drawMainBranchNode(x, y, w, h, n, isSelected);
  } else {
    drawLeafNode(x, y, w, h, n, isSelected, depth);
  }

  ctx.restore();
}

function drawRootNode(x, y, w, h, n, isSelected) {
  // Golden circle for root
  const r = (w + h) / 4 + 4;

  // Outer glow
  if (isSelected) {
    ctx.shadowColor = GOLD_LIGHT;
    ctx.shadowBlur = 20;
  }

  // Gradient fill
  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, '#8b6914');
  grad.addColorStop(0.6, '#6b3a1f');
  grad.addColorStop(1, '#3d1f0a');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.fill();

  // Gold border
  ctx.strokeStyle = isSelected ? GOLD_LIGHT : GOLD;
  ctx.lineWidth = isSelected ? 3 : 2;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI*2);
  ctx.stroke();

  // Double border
  ctx.strokeStyle = 'rgba(201,168,76,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, r + 5, 0, Math.PI*2);
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Text
  ctx.fillStyle = GOLD_LIGHT;
  ctx.font = `bold ${Math.min(16, 90/n.name.length + 8)}px 'Amiri', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.name, x, y);

  if (n.detail) {
    ctx.fillStyle = 'rgba(240,208,128,0.7)';
    ctx.font = `11px 'Cairo', sans-serif`;
    ctx.fillText(n.detail, x, y + 16);
  }
}

function drawMainBranchNode(x, y, w, h, n, isSelected) {
  const rw = w/2 + 6, rh = h/2 + 4;

  if (isSelected) { ctx.shadowColor = GOLD_LIGHT; ctx.shadowBlur = 16; }

  // Ellipse
  ctx.beginPath();
  ctx.ellipse(x, y, rw, rh, 0, 0, Math.PI*2);
  const grad = ctx.createLinearGradient(x-rw, y-rh, x+rw, y+rh);
  grad.addColorStop(0, '#5a2e0a');
  grad.addColorStop(1, '#3d1f0a');
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = isSelected ? GOLD_LIGHT : GOLD;
  ctx.lineWidth = isSelected ? 2.5 : 1.8;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.fillStyle = GOLD_LIGHT;
  ctx.font = `bold ${Math.min(15, 80/n.name.length + 7)}px 'Amiri', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.name, x, y);
}

function drawLeafNode(x, y, w, h, n, isSelected, depth) {
  // Leaf shape
  const rw = w/2, rh = h/2 + 2;

  if (isSelected) { ctx.shadowColor = GOLD_LIGHT; ctx.shadowBlur = 12; }

  // Leaf-like shape
  const greenShade = depth > 3
    ? `rgba(26,74,26,${Math.max(0.6, 1 - (depth-3)*0.1)})`
    : '#2d7a2d';

  ctx.beginPath();
  ctx.ellipse(x, y, rw, rh, 0, 0, Math.PI*2);
  ctx.fillStyle = isSelected ? '#3d8f3d' : greenShade;
  ctx.fill();

  // Gold border for leaf nodes
  ctx.strokeStyle = isSelected ? GOLD_LIGHT : GOLD;
  ctx.lineWidth = isSelected ? 2 : 1.2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Leaf vein line
  ctx.strokeStyle = 'rgba(201,168,76,0.2)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(x, y - rh + 4);
  ctx.lineTo(x, y + rh - 4);
  ctx.stroke();

  ctx.fillStyle = CREAM;
  ctx.font = `bold ${Math.min(13, 75/n.name.length + 6)}px 'Amiri', serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(n.name, x, y);
}

// ============================
// INTERACTIONS
// ============================
function getNodeAt(mx, my) {
  // Transform mouse to tree coords
  const tx = (mx - offsetX) / scale;
  const ty = (my - offsetY) / scale;

  for (let i = nodes.length - 1; i >= 0; i--) {
    const n = nodes[i];
    const depth = getDepth(n.id);
    const rw = n.parentId === null ? 46 : (depth === 1 ? 53 : 47);
    const rh = n.parentId === null ? 30 : (depth === 1 ? 24 : 22);
    const dx = tx - n.x, dy = ty - n.y;
    if ((dx*dx)/(rw*rw) + (dy*dy)/(rh*rh) <= 1) return n;
  }
  return null;
}

function onCanvasClick(e) {
  if (Math.abs(e.clientX - dragStartX) > 5 || Math.abs(e.clientY - dragStartY) > 5) return;
  const rect = canvas.getBoundingClientRect();
  const node = getNodeAt(e.clientX - rect.left, e.clientY - rect.top);
  if (node) selectNode(node.id);
  else { selectedId = null; document.getElementById('nodeActions').style.display = 'none'; draw(); }
}

function selectNode(id) {
  selectedId = id;
  const n = nodes.find(x => x.id === id);
  if (!n) return;

  document.getElementById('nodeActions').style.display = '';
  document.getElementById('selName').textContent = n.name;
  document.getElementById('selDetail').textContent = n.detail || 'بدون تفاصيل';

  // Highlight in list
  document.querySelectorAll('.node-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.id) === id);
  });

  draw();
}

// Pan
let dragStartX = 0, dragStartY = 0;
let dragOffX = 0, dragOffY = 0;
function onMouseDown(e) {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragOffX = offsetX;
  dragOffY = offsetY;
}
function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;

  if (isDragging) {
    offsetX = dragOffX + (e.clientX - dragStartX);
    offsetY = dragOffY + (e.clientY - dragStartY);
    draw();
  }

  // Tooltip
  const node = getNodeAt(mx, my);
  const tt = document.getElementById('tooltip');
  if (node) {
    document.getElementById('ttName').textContent = node.name;
    document.getElementById('ttDetail').textContent = node.detail || '';
    tt.style.left = (e.clientX + 16) + 'px';
    tt.style.top = (e.clientY - 20) + 'px';
    tt.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    tt.classList.remove('visible');
    canvas.style.cursor = isDragging ? 'grabbing' : 'grab';
  }
}
function onMouseUp() { isDragging = false; }

function onWheel(e) {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 0.9 : 1.1;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left, my = e.clientY - rect.top;
  offsetX = mx - (mx - offsetX) * factor;
  offsetY = my - (my - offsetY) * factor;
  scale *= factor;
  scale = Math.max(0.2, Math.min(3, scale));
  draw();
}

// Touch
let lastTouchX, lastTouchY, lastPinchDist;
function onTouchStart(e) {
  if (e.touches.length === 1) {
    isDragging = true;
    lastTouchX = e.touches[0].clientX;
    lastTouchY = e.touches[0].clientY;
    dragOffX = offsetX; dragOffY = offsetY;
    dragStartX = lastTouchX; dragStartY = lastTouchY;
  }
}
function onTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 1 && isDragging) {
    offsetX = dragOffX + (e.touches[0].clientX - dragStartX);
    offsetY = dragOffY + (e.touches[0].clientY - dragStartY);
    draw();
  }
}
function onTouchEnd(e) {
  isDragging = false;
  if (e.changedTouches.length === 1) {
    const rect = canvas.getBoundingClientRect();
    const t = e.changedTouches[0];
    const node = getNodeAt(t.clientX - rect.left, t.clientY - rect.top);
    if (node && Math.abs(t.clientX - dragStartX) < 8) selectNode(node.id);
  }
}

// ============================
// ZOOM / RESET
// ============================
function zoomIn() { scale = Math.min(3, scale * 1.2); draw(); }
function zoomOut() { scale = Math.max(0.2, scale / 1.2); draw(); }
function resetView() {
  if (!nodes.length) return;
  const xs = nodes.map(n => n.x), ys = nodes.map(n => n.y);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys), maxY = Math.max(...ys);
  const tw = maxX - minX + NODE_W*2;
  const th = maxY - minY + NODE_H*4;

  const scaleX = canvas.width / tw;
  const scaleY = canvas.height / th;
  scale = Math.min(scaleX, scaleY, 1.4) * 0.85;

  offsetX = canvas.width/2 - ((minX + maxX)/2) * scale;
  offsetY = 40 - minY * scale + 30;
  draw();
}

// ============================
// UI HELPERS
// ============================
function updateTreeName() {
  treeName = document.getElementById('treeName').value || "شجرة العائلة";
  document.getElementById('treeTitleDisplay').textContent = treeName;
}

function updateNodeList() {
  const list = document.getElementById('nodeList');
  const section = document.getElementById('nodeListSection');

  if (nodes.length > 1) {
    section.style.display = '';
    list.innerHTML = nodes.map(n => `
      <div class="node-item ${n.id === selectedId ? 'active' : ''}" data-id="${n.id}" onclick="selectNode(${n.id})">
        <span class="node-item-name">${'　'.repeat(getDepth(n.id))}${n.name}</span>
        <span class="node-item-role">${n.detail || ''}</span>
      </div>
    `).join('');
  } else {
    section.style.display = 'none';
  }
}

function openEditModal() {
  if (!selectedId) return;
  const n = nodes.find(x => x.id === selectedId);
  document.getElementById('editName').value = n.name;
  document.getElementById('editDetail').value = n.detail || '';
  document.getElementById('editModal').classList.add('open');
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

function saveEdit() {
  if (!selectedId) return;
  const n = nodes.find(x => x.id === selectedId);
  n.name = document.getElementById('editName').value.trim() || n.name;
  n.detail = document.getElementById('editDetail').value.trim();
  closeModal();
  draw();
  updateNodeList();
  document.getElementById('selName').textContent = n.name;
  document.getElementById('selDetail').textContent = n.detail || 'بدون تفاصيل';
}

function flash(id) {
  const el = document.getElementById(id);
  el.style.borderColor = '#ff4444';
  el.focus();
  setTimeout(() => el.style.borderColor = '', 1500);
}

// ============================
// EXPORT
// ============================
function exportTree() {
  const exp = document.createElement('canvas');
  exp.width = canvas.width + 100;
  exp.height = canvas.height + 80;
  const ec = exp.getContext('2d');

  // Background
  ec.fillStyle = '#0d0805';
  ec.fillRect(0, 0, exp.width, exp.height);

  // Title
  ec.fillStyle = '#f0d080';
  ec.font = "bold 32px 'Amiri', serif";
  ec.textAlign = 'center';
  ec.fillText(treeName, exp.width/2, 50);

  // Border
  ec.strokeStyle = '#c9a84c';
  ec.lineWidth = 3;
  ec.strokeRect(10, 10, exp.width-20, exp.height-20);
  ec.strokeStyle = 'rgba(201,168,76,0.3)';
  ec.lineWidth = 1;
  ec.strokeRect(16, 16, exp.width-32, exp.height-32);

  // Copy tree
  ec.drawImage(canvas, 50, 70);

  const link = document.createElement('a');
  link.download = `${treeName}.png`;
  link.href = exp.toDataURL('image/png');
  link.click();
}

// Close modal on overlay click
document.getElementById('editModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
</script>
